<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Precision Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#e5eeff",
                        "primary": "#006c49",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#842225",
                        "outline": "#6c7a71",
                        "on-primary-container": "#00422b",
                        "on-surface": "#0b1c30",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#410005",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#ffdad7",
                        "on-error": "#ffffff",
                        "primary-fixed": "#6ffbbe",
                        "on-primary-fixed-variant": "#005236",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary-container": "#711419",
                        "on-secondary-container": "#3c6c54",
                        "primary-container": "#10b981",
                        "on-tertiary": "#ffffff",
                        "secondary": "#376850",
                        "surface-dim": "#cbdbf5",
                        "on-surface-variant": "#3c4a42",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#002113",
                        "secondary-container": "#b7ebce",
                        "surface": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "on-primary-fixed": "#002113",
                        "secondary-fixed": "#baeed1",
                        "inverse-primary": "#4edea3",
                        "tertiary-container": "#fc7c78",
                        "secondary-fixed-dim": "#9ed2b5",
                        "outline-variant": "#bbcabf",
                        "primary-fixed-dim": "#4edea3",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#d3e4fe",
                        "surface-tint": "#006c49",
                        "surface-container-low": "#eff4ff",
                        "surface-variant": "#d3e4fe",
                        "tertiary": "#a43a3a",
                        "tertiary-fixed-dim": "#ffb3af",
                        "inverse-surface": "#213145",
                        "on-secondary-fixed-variant": "#1e4f3a",
                        "background": "#f8f9ff",
                        "surface-bright": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Login Shell -->
<main class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Brand Header (Asymmetric Layout) -->
<div class="flex flex-col items-center text-center space-y-2">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 mb-4">
<span class="material-symbols-outlined text-white text-3xl" data-icon="precision_manufacturing">precision_manufacturing</span>
</div>
<h1 class="text-3xl font-black text-on-surface tracking-tight">Precision Ledger</h1>
<p class="text-on-surface-variant font-medium text-sm">Sign in to your smart business dashboard</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-2xl shadow-on-surface/[0.03] border border-outline-variant/15">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[16px]" data-icon="alternate_email">alternate_email</span>
                        Email Address
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all outline-none" id="email" placeholder="owner@store.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
                            Password
                        </label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/30 rounded-xl px-4 py-3 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer select-none" for="remember">Stay signed in for 30 days</label>
</div>
<!-- CTA Button (Emerald Gradient) -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In to POS
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Decorative Separator -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant/20"></span>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-tighter">
<span class="bg-surface-container-lowest px-4 text-outline font-medium">Verified Access Only</span>
</div>
</div>
<!-- Alternate Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low rounded-xl text-sm font-bold text-on-surface hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-[18px]" data-icon="qr_code_scanner">qr_code_scanner</span>
                    Scan QR
                </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low rounded-xl text-sm font-bold text-on-surface hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-[18px]" data-icon="fingerprint">fingerprint</span>
                    Biometric
                </button>
</div>
</div>
<!-- Footer Footer (Task Suppression Rule: Hiding Shell Nav for transactional screen) -->
<footer class="text-center space-y-4">
<p class="text-on-surface-variant text-sm font-medium">
                New store? <a class="text-primary font-bold hover:underline" href="#">Get started here</a>
</p>
<div class="flex items-center justify-center gap-6 text-outline text-[11px] font-bold uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</main>
<!-- Visual Polish: Background Tonal Layers -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute top-[60%] -right-[5%] w-[30%] h-[30%] rounded-full bg-surface-container-highest/50 blur-[100px]"></div>
</div>
</body></html>

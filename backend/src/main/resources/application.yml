spring:
  application:
    name: smart-pos-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/smart_pos}
    username: ${DATABASE_USERNAME:smart_pos}
    password: ${DATABASE_PASSWORD:smart_pos}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-stacktrace: never
    include-binding-errors: never

app:
  base-path: /api/v1
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    issuer: smart-pos
    secret: ${JWT_SECRET:change-me-please-this-is-a-dev-only-secret-please-replace-32+}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    default-password: ${APP_SEED_PASSWORD:Password123!}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.smartpos: DEBUG

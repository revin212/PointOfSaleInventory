spring:
  datasource:
    url: jdbc:h2:mem:smartpos;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret-32bytes-min
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 3600
  seed:
    enabled: false
    default-password: TestPass123!

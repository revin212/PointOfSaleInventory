services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_pos_postgres
    environment:
      POSTGRES_DB: smart_pos
      POSTGRES_USER: smart_pos
      POSTGRES_PASSWORD: smart_pos
    ports:
      - "5432:5432"
    volumes:
      - smart_pos_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_pos -d smart_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smart_pos_db:
